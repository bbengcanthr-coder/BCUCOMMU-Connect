<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BCUCOMMU - Pre-freshy Connect</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Sarabun:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        /* --- CSS ส่วนตกแต่ง (Minimal Navy Theme) --- */
        :root {
            --navy-dark: #001f3f; /* สีน้ำเงินกรมท่าเข้ม */
            --navy-main: #003366; /* สีน้ำเงินกรมท่าหลัก */
            --white: #ffffff;
            --bg-light: #f4f7f6; /* สีพื้นหลังเทาอ่อนมากๆ */
            --gray-chat: #e9ecef; /* สีกล่องแชทเพื่อน */
            --text-dark: #333333;
            --text-muted: #888888;
        }

        body { 
            /* ใช้ Inter เป็นฟอนต์หลัก ถ้าไม่มีให้ใช้ Sarabun */
            font-family: 'Inter', 'Sarabun', sans-serif; 
            margin: 0; 
            background-color: var(--bg-light);
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            color: var(--text-dark);
        }

        /* Container หลักทรงมือถือ */
        #app-container {
            width: 100%;
            max-width: 480px; /* ขนาดกำลังดีสำหรับแอปแชท */
            height: 95vh; /* เกือบเต็มความสูงจอ */
            background: var(--white);
            border-radius: 24px; /* โค้งมนแบบทันสมัย */
            box-shadow: 0 15px 35px rgba(0,0,0,0.05); /* เงาบางๆ */
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid rgba(0,0,0,0.03);
        }

        /* Header สีน้ำเงินกรม */
        header {
            background-color: var(--navy-main);
            color: var(--white);
            padding: 18px 25px;
            text-align: center;
            font-weight: 600;
            font-size: 1.1rem;
            letter-spacing: 0.5px; /* ระยะห่างตัวอักษรแบบมินิมอล */
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        /* พื้นที่แสดงข้อความ */
        #chat { 
            flex: 1; 
            overflow-y: auto; 
            padding: 25px; 
            display: flex;
            flex-direction: column;
            gap: 12px;
            background-color: var(--white);
        }

        /* สไตล์ข้อความแชท (Minimal Style) */
        .msg {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 0.95rem;
            line-height: 1.5;
            position: relative;
            word-wrap: break-word;
        }
        
        /* ข้อความของเพื่อน (สีเทาอ่อน) */
        .msg.other { 
            background-color: var(--gray-chat); 
            align-self: flex-start; 
            color: var(--text-dark);
            border-bottom-left-radius: 4px; /* หางลูกโป่งแชท */
        }
        
        /* ข้อความของเรา (สีน้ำเงินกรม) */
        .msg.me { 
            background-color: var(--navy-main); 
            align-self: flex-end; 
            color: var(--white);
            border-bottom-right-radius: 4px;
        }
        
        /* ชื่อคนส่ง (ซ่อนไว้เพื่อความมินิมอล หรือเปิดถ้าต้องการ) */
        .msg-user {
            font-size: 0.75rem;
            margin-bottom: 4px;
            display: none; /* ซ่อนชื่อ */
        }
        .msg.other .msg-user { color: var(--text-muted); }

        /* ข้อความแจ้งเตือนระบบ */
        .status { 
            text-align: center; 
            color: var(--text-muted); 
            font-size: 0.8rem; 
            margin: 15px 0; 
            font-weight: 400;
        }

        /* พื้นที่พิมพ์ข้อความด้านล่าง */
        .input-box { 
            display: flex; 
            padding: 15px 20px; 
            background: var(--white); 
            border-top: 1px solid rgba(0,0,0,0.05);
            gap: 12px;
            align-items: center;
        }

        input { 
            flex: 1; 
            padding: 14px 20px; 
            border: 1px solid #e0e0e0; 
            border-radius: 30px; /* โค้งมนสุดๆ */
            outline: none;
            transition: all 0.2s ease;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            background-color: var(--bg-light);
        }
        input:focus { 
            border-color: var(--navy-main); 
            background-color: var(--white);
            box-shadow: 0 0 0 3px rgba(0, 51, 102, 0.1); /* Effect ตอนกด */
        }

        button {
            background-color: var(--navy-main);
            color: var(--white);
            border: none;
            padding: 14px 28px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.95rem;
            transition: background-color 0.2s ease;
            font-family: 'Inter', sans-serif;
        }
        button:hover { background-color: var(--navy-dark); }
        button:active { transform: scale(0.98); } /* Effect ตอนกด */

        /* ปรับแต่ง Scrollbar ให้ดูมินิมอล */
        #chat::-webkit-scrollbar { width: 6px; }
        #chat::-webkit-scrollbar-track { background: transparent; }
        #chat::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 3px; }
    </style>
</head>
<body>

    <div id="app-container">
        <header>BCUCOMMU Connect</header>
        
        <div id="chat">
            <div class="status">กำลังเริ่มต้นระบบ...</div>
        </div>

        <div class="input-box">
            <input id="m" autocomplete="off" placeholder="พิมพ์ข้อความของคุณ...">
            <button onclick="send()">ส่ง</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let myName = "";

        // ถามชื่อตอนเริ่มต้นแบบมินิมอล
        window.onload = () => {
            const nameInput = prompt("ยินดีต้อนรับสู่ BCUCOMMU\nกรอกชื่อเล่นของคุณเพื่อเริ่มค้นหาเพื่อน:");
            // ถ้าไม่กรอกชื่อ ให้ใช้ชื่อสุ่ม
            myName = nameInput ? nameInput.trim() : "เพื่อนใหม่_" + Math.floor(Math.random()*1000);
            if(myName === "") myName = "เพื่อนใหม่_" + Math.floor(Math.random()*1000);
            
            socket.emit('join', myName);
            addStatus(`สวัสดีคุณ ${myName}, กำลังนำคุณเข้าสู่ห้องรอก่อนนะ...`);
        };
        
        // เมื่อจับคู่สำเร็จ
        socket.on('chat_start', d => {
            // หาชื่อเพื่อนคุย
            const partner = d.users.find(u => u !== myName);
            // ล้างหน้าจอแชทเดิม
            document.getElementById('chat').innerHTML = '';
            addStatus(`เชื่อมต่อกับ "${partner}" เรียบร้อยแล้ว`);
            addStatus(`เริ่มบทสนทนาได้เลย!`);
        });

        // เมื่อได้รับข้อความ
        socket.on('message', d => {
            // ตรวจสอบว่าเป็นข้อความของเราหรือของเพื่อน
            const type = d.user === myName ? 'me' : 'other';
            addMessage(d.user, d.text, type);
        });

        // เมื่อได้รับแจ้งเตือนสถานะจากระบบ
        socket.on('status', s => addStatus(s));

        // ฟังก์ชันเพิ่มลูกโป่งแชท
        function addMessage(user, text, type) {
            const chat = document.getElementById('chat');
            const div = document.createElement('div');
            div.className = `msg ${type}`;
            
            // ใส่ชื่อคนส่ง (ปกติซ่อนไว้ใน CSS)
            const userSpan = document.createElement('div');
            userSpan.className = 'msg-user';
            userSpan.innerText = user;
            
            // ใส่เนื้อหาข้อความ
            const textSpan = document.createElement('span');
            textSpan.innerText = text;
            
            div.appendChild(userSpan);
            div.appendChild(textSpan);
            chat.appendChild(div);
            
            // เลื่อนลงล่างสุดอัตโนมัติแบบนุ่มนวล
            chat.scrollTo({ top: chat.scrollHeight, behavior: 'smooth' });
        }

        // ฟังก์ชันเพิ่มข้อความแจ้งเตือนระบบ
        function addStatus(text) {
            const chat = document.getElementById('chat');
            const div = document.createElement('div');
            div.className = 'status';
            div.innerText = text;
            chat.appendChild(div);
            chat.scrollTo({ top: chat.scrollHeight, behavior: 'smooth' });
        }

        // ฟังก์ชันส่งข้อความ
        function send() {
            const i = document.getElementById('m');
            // ตรวจสอบว่าไม่ได้ส่งค่าว่าง
            if(i.value.trim() !== "") {
                socket.emit('message', i.value);
                i.value = ''; // ล้างช่องพิมพ์
                i.focus(); // ให้ Cursor กลับมาอยู่ที่ช่องพิมพ์
            }
        }

        // ฟังเหตุการณ์กดปุ่มบนคีย์บอร์ด (ถ้ากด Enter ให้ส่ง)
        document.getElementById('m').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') send();
        });
    </script>
</body>
</html>
